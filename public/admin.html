<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    .stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 25px;
}

.stat-card {
  background: white;
  padding: 18px 20px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  transition: transform 0.2s;
}

.stat-card:hover {
  transform: translateY(-3px);
}

.stat-card h4 {
  font-size: 0.9rem;
  color: #64748b;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}

.stat-card p {
  font-size: 1.9rem;
  font-weight: bold;
  color: #0f172a;
}


    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
    }

    header {
      background-color: #0f172a;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    header h2 {
      font-size: 1.6rem;
    }

    header button {
      background-color: #ef4444;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .container {
      padding: 25px 30px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      margin-bottom: 20px;
    }

    .controls input,
    .controls select {
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 0.95rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
    }

    th {
      background-color: #e2e8f0;
      font-weight: 600;
    }

    tr {
      border-bottom: 1px solid #f1f5f9;
    }

    tr:hover {
      background-color: #f1f5f9;
    }

    select.status-select {
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-size: 0.9rem;
    }

    @media (max-width: 768px) {
      .controls {
        flex-direction: column;
      }
    }

    #exportBtn {
  background-color: #10b981;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.3s;
}

#exportBtn:hover {
  background-color: #059669;
}

/* Sticky table header */
table thead th {
  position: sticky;
  top: 0;
  background: #e2e8f0;
  z-index: 1;
}

/* Hover effect for rows */
tr:hover {
  background-color: #f1f5f9;
  transform: scale(1.01);
  transition: 0.2s;
}

/* Button hover */
button:hover {
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

  </style>
</head>
<body>

<header>
  <h2>Leads Dashboard</h2>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">
  <div class="stats">
  <div class="stat-card">
    <h4>Total Leads</h4>
    <p id="totalLeads">0</p>
  </div>

  <div class="stat-card">
    <h4>New Today</h4>
    <p id="todayLeads">0</p>
  </div>

  <div class="stat-card">
    <h4>Converted</h4>
    <p id="convertedLeads">0</p>
  </div>

  <div class="stat-card">
    <h4>Last 7 Days</h4>
    <p id="weekLeads">0</p>
  </div>
</div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search name or email">

    <select id="serviceFilter">
      <option value="">All Services</option>
      <option>Talent Acquisition</option>
      <option>Training & Development</option>
      <option>Compensation & Benefits</option>
      <option>HR Compliance</option>
      <option>Others</option>
    </select>

    <button id="exportBtn">Export CSV</button>

  </div>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Service</th>
        <th>Message</th>
        <th>Date</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="leadsTable"></tbody>
  </table>

</div>

<canvas id="leadsChart" height="200"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctx = document.getElementById('leadsChart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Talent Acquisition', 'Training', 'Comp & Benefits', 'HR Compliance', 'Others'],
      datasets: [{
        label: 'Leads Count',
        data: [12, 19, 7, 5, 3], // dynamically populate from Firestore
        backgroundColor: 'rgba(59, 130, 246, 0.6)',
        borderColor: 'rgba(59, 130, 246, 1)',
        borderWidth: 1
      }]
    },
    options: { responsive: true, plugins: { legend: { display: false } } }
  });
</script>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  orderBy,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// --- Firebase config ---
const firebaseConfig = {
  apiKey: "AIzaSyDwUE02BSa94E9DqgqvXuG_g2itD2ZbkZk",
  authDomain: "prudenthr-eeeba.firebaseapp.com",
  projectId: "prudenthr-eeeba"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// --- Elements ---
const table = document.getElementById("leadsTable");
const search = document.getElementById("search");
const serviceFilter = document.getElementById("serviceFilter");
const totalEl = document.getElementById("totalLeads");
const todayEl = document.getElementById("todayLeads");
const convertedEl = document.getElementById("convertedLeads");
const weekEl = document.getElementById("weekLeads");
const exportBtn = document.getElementById("exportBtn");

// --- Auth check ---
onAuthStateChanged(auth, user => {
  if (!user) window.location.href = "admin_login.html";
});

// --- Firestore query ---
const q = query(collection(db, "leads"), orderBy("createdAt", "desc"));
let allLeads = [];

onSnapshot(q, snapshot => {
  allLeads = [];
  snapshot.forEach(docSnap => allLeads.push({ id: docSnap.id, ...docSnap.data() }));
  updateStats();
  renderTable();
});

// --- Render table ---
function renderTable() {
  table.innerHTML = "";
  const text = search.value.toLowerCase();
  const service = serviceFilter.value;

  const filtered = allLeads.filter(lead => {
    const matchSearch =
      !text ||
      lead.name?.toLowerCase().includes(text) ||
      lead.email?.toLowerCase().includes(text) ||
      lead.message?.toLowerCase().includes(text);

    const leadService = lead.service && lead.service.trim() !== "" ? lead.service : "Others";
    const matchService = !service || leadService === service;

    return matchSearch && matchService;
  });

  if (filtered.length === 0) {
    table.innerHTML = `<tr><td colspan="7" style="text-align:center; padding:20px;">No leads found</td></tr>`;
    return;
  }

  filtered.forEach(lead => {
    const date = lead.createdAt?.toDate ? lead.createdAt.toDate().toLocaleString() : "-";
    const displayService = lead.service && lead.service.trim() !== "" ? lead.service : "Others";
    const status = lead.status || "New";

    const row = `
      <tr>
        <td>${lead.name || "-"}</td>
        <td>${lead.email || "-"}</td>
        <td>${lead.phone || "-"}</td>
        <td>${displayService}</td>
        <td style="max-width:260px; white-space:pre-wrap;">${lead.message || "-"}</td>
        <td>${date}</td>
        <td>
          <select class="status-select" data-id="${lead.id}">
            <option ${status==="New"?"selected":""}>New</option>
            <option ${status==="Contacted"?"selected":""}>Contacted</option>
            <option ${status==="Converted"?"selected":""}>Converted</option>
            <option ${status==="Closed"?"selected":""}>Closed</option>
          </select>
        </td>
      </tr>
    `;
    table.insertAdjacentHTML("beforeend", row);
  });
}

// --- Update stats ---
function updateStats() {
  const now = new Date();
  const todayStart = new Date(now.setHours(0,0,0,0));
  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 7);

  totalEl.innerText = allLeads.length;
  todayEl.innerText = allLeads.filter(l => l.createdAt && l.createdAt.toDate() >= todayStart).length;
  convertedEl.innerText = allLeads.filter(l => l.status === "Converted").length;
  weekEl.innerText = allLeads.filter(l => l.createdAt && l.createdAt.toDate() >= weekAgo).length;
}

// --- Status change ---
document.addEventListener("change", async (e) => {
  if (e.target.classList.contains("status-select")) {
    const id = e.target.dataset.id;
    const status = e.target.value;
    try {
      await updateDoc(doc(db, "leads", id), { status });
    } catch(err) {
      console.error("Status update error:", err);
      alert("Failed to update status. Try again.");
    }
  }
});

// --- Filters ---
search.addEventListener("input", renderTable);
serviceFilter.addEventListener("change", renderTable);

// --- Logout ---
window.logout = async () => {
  await signOut(auth);
  window.location.href = "admin_login.html";
};

// --- Export to CSV ---
exportBtn.addEventListener("click", () => {
  if (!allLeads.length) return alert("No leads to export!");
  const text = search.value.toLowerCase();
  const service = serviceFilter.value;

  const filteredLeads = allLeads.filter(d => {
    const nameMatch = !text || d.name?.toLowerCase().includes(text) || d.email?.toLowerCase().includes(text);
    const leadService = d.service && d.service.trim() !== "" ? d.service : "Others";
    const serviceMatch = !service || leadService === service;
    return nameMatch && serviceMatch;
  });

  const headers = ["Name","Email","Phone","Service","Message","Date","Status"];
  const rows = filteredLeads.map(d => [
    d.name || "",
    d.email || "",
    d.phone || "",
    d.service && d.service.trim() !== "" ? d.service : "Others",
    d.message || "",
    d.createdAt ? d.createdAt.toDate().toLocaleString() : "",
    d.status || "New"
  ]);

  let csvContent = "data:text/csv;charset=utf-8," 
      + [headers.join(","), ...rows.map(r => r.map(cell => `"${cell}"`).join(","))].join("\n");

  const encodedUri = encodeURI(csvContent);
  const link = document.createElement("a");
  link.setAttribute("href", encodedUri);
  link.setAttribute("download", `leads_export_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});
</script>


</body>
</html>
