<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PrudentHR | Admin Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --dark: #0f172a;
      --bg: #f1f5f9;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      opacity: 0; /* Anti-flicker */
      transition: opacity 0.5s ease;
    }

    /* Header & Navigation */
    header {
      background: var(--dark);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      color: white;
    }

    .logo-area h2 { font-weight: 700; letter-spacing: -0.5px; }

    .logout-btn {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .logout-btn:hover { background: #dc2626; transform: translateY(-1px); }

    /* Main Content Area */
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      border: 1px solid #e2e8f0;
    }

    .stat-card h4 { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 0.5rem; }
    .stat-card p { font-size: 1.75rem; font-weight: 700; color: var(--dark); }

    /* Chart Section */
    .chart-container {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      margin-bottom: 2rem;
      border: 1px solid #e2e8f0;
    }

    /* Controls & Table */
    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    input, select {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      outline: none;
      font-size: 0.95rem;
    }

    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

    .table-wrapper {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
      border: 1px solid #e2e8f0;
    }

    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 1rem; text-align: left; font-size: 0.85rem; color: var(--text-muted); border-bottom: 1px solid #e2e8f0; }
    td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }
    
    .status-select {
      background: #f1f5f9;
      border: none;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <div class="logo-area"><h2>PrudentHR <span style="color:var(--primary)">Portal</span></h2></div>
  <button class="logout-btn" onclick="logout()">Sign Out</button>
</header>

<div class="container">
  <div class="stats-grid">
    <div class="stat-card"><h4>Total Leads</h4><p id="totalLeads">0</p></div>
    <div class="stat-card"><h4>Active Today</h4><p id="todayLeads">0</p></div>
    <div class="stat-card"><h4>Success Rate</h4><p id="convertedLeads">0</p></div>
    <div class="stat-card"><h4>Weekly Volume</h4><p id="weekLeads">0</p></div>
  </div>

  <div class="chart-container">
    <h3 style="margin-bottom: 1rem; font-size: 1rem;">Service Distribution</h3>
    <canvas id="leadsChart" height="80"></canvas>
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search by name or email..." style="flex: 2;">
    
    <select id="sourceFilter" style="flex: 1;">
      <option value="">All Sources</option>
      <option value="Contact_Form">Contact Messages</option>
      <option value="Access_Lead">Popup Entries</option>
    </select>

    <select id="serviceFilter" style="flex: 1;">
      <option value="">All Services</option>
      <option>Talent Acquisition</option>
      <option>Training & Development</option>
      <option>Compensation & Benefits</option>
      <option>HR Compliance</option>
    </select>
    
    <button id="exportBtn" style="background:var(--primary); color:white; border:none; border-radius:8px; padding:0 1.5rem; cursor:pointer; font-weight:600;">Export CSV</button>
</div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>CLIENT</th>
          <th>CONTACT INFO</th>
          <th>SERVICE</th>
          <th>MESSAGE</th>
          <th>SUBMITTED</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody id="leadsTable"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// --- Configuration ---
const firebaseConfig = {
  apiKey: "AIzaSyDltU_9SEXm90Y82Ndx3_Ug74CK4EA_bVQ", 
  authDomain: "prudenthr-eeeba.firebaseapp.com",
  projectId: "prudenthr-eeeba",
  storageBucket: "prudenthr-eeeba.firebasestorage.app",
  messagingSenderId: "316130454247",
  appId: "1:316130454247:web:82b61dd2068c6cf029d042",
  measurementId: "G-9MFEWVRCTP"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let chart;
const ctx = document.getElementById('leadsChart').getContext('2d');
let allLeads = [];

// --- Initialize Chart ---
function initChart() {
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Talent Acquisition', 'Training', 'Benefits', 'Compliance', 'Popup Leads'],
      datasets: [{
        label: 'Leads',
        data: [0, 0, 0, 0, 0],
        backgroundColor: '#3b82f6',
        borderRadius: 6,
        barThickness: 40
      }]
    },
    options: {
      responsive: true,
      scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } },
      plugins: { legend: { display: false } }
    }
  });
}

// --- Auth Observer ---
onAuthStateChanged(auth, user => {
  if (!user) {
    window.location.href = "admin_login.html";
  } else {
    document.body.style.opacity = "1";
    initChart();
    startListening(); // Start real-time data fetch
  }
});

// --- Real-time Data Sync ---
function startListening() {
  const q = query(collection(db, "leads"), orderBy("createdAt", "desc"));
  onSnapshot(q, snapshot => {
    allLeads = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    updateChart();
    renderTable();
  });
}

// --- Update Stats Cards ---
function updateStats() {
  const now = new Date();
  const today = new Date(now.setHours(0,0,0,0));
  
  document.getElementById("totalLeads").innerText = allLeads.length;
  document.getElementById("todayLeads").innerText = allLeads.filter(l => l.createdAt?.toDate() >= today).length;
  document.getElementById("convertedLeads").innerText = allLeads.filter(l => l.status === "Converted").length;
  document.getElementById("weekLeads").innerText = allLeads.filter(l => {
    const week = new Date(); week.setDate(week.getDate() - 7);
    return l.createdAt?.toDate() >= week;
  }).length;
}

// --- Update Visualization ---
function updateChart() {
  if (!chart) return;
  const cats = ['Talent Acquisition', 'Training & Development', 'Compensation & Benefits', 'HR Compliance'];
  
  // Logic to separate Popup leads from Service leads
  const counts = cats.map(c => allLeads.filter(l => l.service === c && l.type !== "Access_Lead").length);
  const popupCount = allLeads.filter(l => l.type === "Access_Lead").length;
  
  chart.data.datasets[0].data = [...counts, popupCount];
  chart.update();
}

// --- Render Table with Source Filter ---
function renderTable() {
  const table = document.getElementById("leadsTable");
  const searchText = document.getElementById("search").value.toLowerCase();
  const serviceFilter = document.getElementById("serviceFilter").value;
  const sourceFilter = document.getElementById("sourceFilter") ? document.getElementById("sourceFilter").value : "";

  table.innerHTML = "";

  const filteredLeads = allLeads.filter(l => {
    const matchesSearch = !searchText || l.name?.toLowerCase().includes(searchText) || l.email?.toLowerCase().includes(searchText);
    const matchesService = !serviceFilter || l.service === serviceFilter;
    
    // Source filter logic
    let matchesSource = true;
    if (sourceFilter === "Access_Lead") {
      matchesSource = (l.type === "Access_Lead");
    } else if (sourceFilter === "Contact_Form") {
      matchesSource = (l.type !== "Access_Lead");
    }

    return matchesSearch && matchesService && matchesSource;
  });

  filteredLeads.forEach(l => {
    const isPopup = l.type === "Access_Lead";
    const sourceLabel = isPopup 
        ? `<span style="background:#fef3c7; color:#92400e; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:bold;">POPUP ACCESS</span>` 
        : `<span style="background:#dcfce7; color:#166534; padding:2px 6px; border-radius:4px; font-size:10px; font-weight:bold;">CONTACT FORM</span>`;

    const row = `
      <tr>
        <td><strong>${l.name || "Unknown"}</strong><br>${sourceLabel}</td>
        <td style="color:var(--text-muted); font-size:0.85rem;">${l.email}<br>${l.phone}</td>
        <td>
            <span style="background:#eff6ff; color:#1e40af; padding:4px 8px; border-radius:4px; font-size:0.8rem;">
                ${l.service || "Website Access"}
            </span>
        </td>
        <td style="max-width:200px; font-size:0.85rem;">
            ${l.message || "<i>No message (Popup Lead)</i>"}
        </td>
        <td>${l.createdAt?.toDate().toLocaleDateString() || "-"}</td>
        <td>
          <select class="status-select" onchange="updateStatus('${l.id}', this.value)">
            <option ${l.status==='New'?'selected':''}>New</option>
            <option ${l.status==='Contacted'?'selected':''}>Contacted</option>
            <option ${l.status==='Converted'?'selected':''}>Converted</option>
          </select>
        </td>
      </tr>`;
    table.insertAdjacentHTML("beforeend", row);
  });
}

// --- Helper Functions & Events ---
window.updateStatus = async (id, status) => {
  await updateDoc(doc(db, "leads", id), { status });
};

window.logout = () => signOut(auth).then(() => window.location.href = "index.html");

document.getElementById("search").addEventListener("input", renderTable);
document.getElementById("serviceFilter").addEventListener("change", renderTable);

// Listener for the new Source Filter (ensure this ID exists in your HTML)
if(document.getElementById("sourceFilter")) {
    document.getElementById("sourceFilter").addEventListener("change", renderTable);
}

document.getElementById("exportBtn").addEventListener("click", () => {
  let csv = "Name,Email,Phone,Service,Source,Status\n";
  allLeads.forEach(l => {
    const source = l.type === "Access_Lead" ? "Popup" : "Contact Form";
    csv += `${l.name},${l.email},${l.phone},${l.service || 'N/A'},${source},${l.status || 'New'}\n`;
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'PrudentHR_Leads.csv'; a.click();
});
</script>

</body>
</html>
