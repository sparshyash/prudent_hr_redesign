<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #fff;
      padding: 30px;
      width: 320px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #1e40af;
    }
    .error {
      color: red;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-6X0JJ79X0D"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-6X0JJ79X0D');
</script>

<body>

<div class="login-box">
  <h2>Admin Login</h2>
  <input type="email" id="email" placeholder="Admin Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <button id="loginBtn">Login</button>
  <p class="error" id="error"></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDltU_9SEXm90Y82Ndx3_Ug74CK4EA_bVQ", // Your New Key
    authDomain: "prudenthr-eeeba.firebaseapp.com",
    projectId: "prudenthr-eeeba",
    storageBucket: "prudenthr-eeeba.firebasestorage.app",
    messagingSenderId: "316130454247",
    appId: "1:316130454247:web:82b61dd2068c6cf029d042",
    measurementId: "G-9MFEWVRCTP"
  };

  // Initialize
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Use an Event Listener instead of onclick=""
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorEl = document.getElementById("error");
    const btn = document.getElementById("loginBtn");

    errorEl.textContent = ""; // Clear old errors
    btn.textContent = "Verifying...";
    btn.disabled = true;

    try {
      await signInWithEmailAndPassword(auth, email, password);
      // Success! Redirect to your dashboard
      window.location.href = "admin.html";
    } catch (err) {
      console.error(err.code);
      btn.textContent = "Login";
      btn.disabled = false;
      
      // Specific error handling
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
          errorEl.textContent = "Invalid admin credentials";
      } else {
          errorEl.textContent = "Error: " + err.message;
      }
    }
  });
</script>
</body>
</html>
