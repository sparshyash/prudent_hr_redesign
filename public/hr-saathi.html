<!DOCTYPE html>
<html lang="en">
<style>
    .flashing-icon {
        display: inline-block;
        animation: flash 1.5s infinite;
      }
  
      @keyframes flash {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
</style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Saathi | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#4f46e5' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .gradient-hero { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); }
        .dark .modal-content { background-color: #1e293b; color: white; }
        .dark .bg-card { background-color: #1e293b; border-color: #334155; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <a href="#" class="flex items-center gap-2">
                <div class="w-10 h-10 gradient-hero rounded-xl flex items-center justify-center"><i data-lucide="briefcase" class="text-white w-6 h-6"></i></div>
                <span class="text-2xl font-extrabold">HR<span class="text-indigo-600">Saathi</span></span>
            </a>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-all">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
                <button onclick="openAdmin()" class="gradient-hero text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg">Admin</button>
            </div>
        </div>
    </nav>

    <header class="pt-40 pb-12 px-4 text-center">
        <h1 class="text-4xl md:text-6xl font-black mb-8">Verified <span class="text-indigo-600">HR Feed</span></h1>
        <div class="max-w-xl mx-auto relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search by topic, keyword, or law..." 
                class="w-full p-4 pl-12 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
        </div>
    </header>

    <main class="container mx-auto px-4 pb-32">
        <div class="flex flex-wrap justify-center gap-2 mb-12">
            <button class="cat-btn active px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="All">All</button>
            <button class="cat-btn px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="Recruitment">Recruitment</button>
            <button class="cat-btn px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="Leadership">Leadership</button>
            <button class="cat-btn px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="Compliance">Compliance</button>
        </div>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="loginModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md bg-black/50">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
            <h2 class="text-xl font-bold mb-6">Admin Verification</h2>
            <input id="adminPin" type="password" maxlength="4" placeholder="PIN" class="w-full text-center text-3xl p-4 border rounded-2xl mb-6 bg-slate-50 dark:bg-slate-800 outline-none">
            <button onclick="checkPin()" class="w-full gradient-hero text-white p-4 rounded-2xl font-bold">Access Editor</button>
        </div>
    </div>

    <div id="publishModal" class="fixed inset-0 z-[101] hidden flex items-center justify-center p-4 backdrop-blur-md bg-black/50">
    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl w-full max-w-5xl shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Blog Editor</h2>
            <button onclick="generateAIContent()" class="bg-indigo-100 text-indigo-600 px-4 py-2 rounded-xl text-sm font-bold hover:bg-indigo-200 transition-all">
                ✨ AI Generate Content
            </button>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-6">
            <div>
                <input id="newTitle" oninput="updatePreview()" type="text" placeholder="Blog Title..." class="w-full p-4 mb-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none border border-transparent focus:border-indigo-500">
                
                <select id="newCategory" class="w-full p-4 mb-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none">
                    <option>Recruitment</option>
                    <option>Leadership</option>
                    <option>Compliance</option>
                    <option>HR Trends</option>
                </select>

                <input id="newMedia" oninput="updatePreview()" type="text" placeholder="Google Drive Link or Image URL" class="w-full p-4 mb-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none">
                
                <div class="mb-4">
                    <label class="text-xs font-bold text-slate-400 uppercase mb-2 block">Article Body</label>
                    <div id="editor-container" class="h-64 dark:bg-slate-800 rounded-b-xl"></div>
                </div>
            </div>

            <div class="border-l border-slate-200 dark:border-slate-800 pl-8 hidden lg:block">
                <p class="text-xs font-bold text-slate-400 mb-4 uppercase text-center">Live Tablet Preview</p>
                <div class="rounded-[2.5rem] p-4 bg-slate-800 border-[8px] border-slate-700 shadow-2xl mx-auto max-w-[300px]">
                    <div class="bg-white dark:bg-slate-900 rounded-[1.5rem] overflow-hidden min-h-[400px]">
                        <img id="previewImg" src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=400" class="w-full h-32 object-cover">
                        <div class="p-4">
                            <h3 id="previewTitle" class="font-bold text-md leading-tight text-slate-800 dark:text-white">Blog Title Preview</h3>
                            <div class="h-2 w-12 bg-indigo-500 my-2 rounded-full"></div>
                            <p class="text-[10px] text-slate-400 mt-2">Professional insight verified by HR Saathi...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex gap-4">
            <button onclick="savePost()" class="flex-1 gradient-hero text-white p-4 rounded-xl font-bold shadow-lg">Publish to Global Feed</button>
            <button onclick="closeModal('publishModal')" class="px-6 bg-slate-100 dark:bg-slate-800 rounded-xl font-semibold">Cancel</button>
        </div>
    </div>
</div>
            
    <div id="readerModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 backdrop-blur-md bg-black/50">
        <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[2rem] w-full max-w-4xl shadow-2xl max-h-[85vh] overflow-y-auto relative">
            <button onclick="closeModal('readerModal')" class="absolute top-6 right-6 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            <div id="readerBody"></div>
        </div>
    </div>

    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-12">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <span class="font-bold text-lg">HR Saathi</span>
                <p class="text-slate-500 text-sm mt-1">Empowering HR professionals through data.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="exportToCSV()" class="text-xs font-bold uppercase tracking-widest text-indigo-600">Export CSV</button>
                <div class="h-4 w-[1px] bg-slate-300"></div>
                <p class="text-xs text-slate-400 uppercase tracking-widest">© 2026 Verified Portal</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>

<script>
    // 2. Firebase Configuration (Matches your dashboard/src/firebase.js)
    const firebaseConfig = {
        apiKey: "AIzaSyDltU_9SEXm90Y82Ndx3_Ug74CK4EA_bVQ",
        authDomain: "prudenthr-eeeba.firebaseapp.com",
        projectId: "prudenthr-eeeba"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const MASTER_PIN = "1234";
    let newsData = [];
    let activeCategory = "All";

    // Initialize Quill Editor
    const quill = new Quill('#editor-container', { 
        theme: 'snow',
        modules: { toolbar: [[{ 'header': [1, 2, false] }], ['bold', 'italic', 'link'], [{ 'list': 'ordered'}, { 'list': 'bullet' }], ['clean']] }
    });

    // --- FETCH DATA FROM FIRESTORE ---
    async function loadBlogs() {
        const snapshot = await db.collection("blogs").orderBy("createdAt", "desc").get();
        newsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderGrid();
    }

    // --- ADMIN ACCESS ---
    function checkPin() {
        const pinInput = document.getElementById('adminPin').value;
        if(pinInput === MASTER_PIN) {
            closeModal('loginModal');
            document.getElementById('publishModal').classList.remove('hidden');
            document.getElementById('adminPin').value = '';
        } else { alert("Unauthorized PIN"); }
    }

    // --- SAVE TO GLOBAL FEED (FIRESTORE) ---
    async function savePost() {
        const title = document.getElementById('newTitle').value;
        const mediaUrl = document.getElementById('newMedia').value;
        const submitBtn = document.querySelector("button[onclick='savePost()']");
        
        if(!title) return alert("Please enter a title");

        submitBtn.disabled = true;
        submitBtn.innerText = "Publishing...";

        const newPost = {
            title: title,
            category: document.getElementById('newCategory').value,
            media: fixMediaUrl(mediaUrl),
            content: quill.root.innerHTML,
            excerpt: quill.getText().substring(0, 100) + "...",
            date: new Date().toLocaleDateString(),
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            verifiedBy: "Prudent HR" // Brand Integration
        };

        try {
            await db.collection("blogs").add(newPost);
            await loadBlogs(); // Refresh feed
            closeModal('publishModal');
            // Reset form
            document.getElementById('newTitle').value = '';
            document.getElementById('newMedia').value = '';
            quill.setContents([]);
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Failed to publish.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Publish to Global Feed";
        }
    }

    // --- SEARCH & RENDER LOGIC ---
    function renderGrid(searchQuery = "") {
        const grid = document.getElementById('news-grid');
        grid.innerHTML = '';
        
        const filtered = newsData.filter(post => {
            const matchesSearch = post.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                 post.excerpt.toLowerCase().includes(searchQuery.toLowerCase());
            const matchesCat = activeCategory === "All" || post.category === activeCategory;
            return matchesSearch && matchesCat;
        });

        filtered.forEach(post => {
            const card = document.createElement('div');
            card.onclick = () => openReader(post.id);
            card.className = "bg-white dark:bg-slate-900 rounded-3xl overflow-hidden shadow-sm border border-slate-200 dark:border-slate-800 p-4 cursor-pointer hover:shadow-lg transition-all group";
            card.innerHTML = `
                <div class="overflow-hidden rounded-2xl mb-4">
                    <img src="${post.media}" class="w-full h-48 object-cover group-hover:scale-105 transition-transform duration-500">
                </div>
                <div class="flex justify-between items-start">
                    <span class="text-xs font-bold text-indigo-600 uppercase">${post.category}</span>
                    ${post.verifiedBy ? `<span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">Verified by Prudent HR</span>` : ''}
                </div>
                <h3 class="text-xl font-bold mt-2 group-hover:text-indigo-600 transition-colors">${post.title}</h3>
                <p class="text-slate-500 text-sm mt-2 line-clamp-2">${post.excerpt}</p>
                <div class="mt-4 flex justify-between items-center">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">${post.date}</span>
                    <i data-lucide="arrow-right" class="w-4 h-4 text-indigo-600"></i>
                </div>
            `;
            grid.appendChild(card);
        });
        lucide.createIcons();
    }

    // Helper functions for UI
    function openAdmin() { document.getElementById('loginModal').classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }
    function fixMediaUrl(url) { return url || "https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=800"; }
    function handleSearch() { renderGrid(document.getElementById('searchInput').value); }
    
    function openReader(id) {
        const post = newsData.find(p => p.id === id);
        if(!post) return;
        document.getElementById('readerBody').innerHTML = `
            <img src="${post.media}" class="w-full h-64 object-cover rounded-3xl mb-8">
            <h1 class="text-3xl md:text-5xl font-black my-4">${post.title}</h1>
            <div class="prose dark:prose-invert max-w-none text-lg leading-relaxed">${post.content}</div>
        `;
        document.getElementById('readerModal').classList.remove('hidden');
    }

    // Category Filter Event Listeners
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
            btn.classList.add('bg-indigo-600', 'text-white');
            activeCategory = btn.getAttribute('data-category');
            renderGrid();
        });
    });

    // Initial Load
    loadBlogs();
</script>
</body>
</html>
