<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Saathi | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { brand: '#4f46e5' } } }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .gradient-hero { background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%); }
        .dark .modal-content { background-color: #1e293b; color: white; }
        .dark .bg-card { background-color: #1e293b; border-color: #334155; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <a href="#" class="flex items-center gap-2">
                <div class="w-10 h-10 gradient-hero rounded-xl flex items-center justify-center"><i data-lucide="briefcase" class="text-white w-6 h-6"></i></div>
                <span class="text-2xl font-extrabold">HR<span class="text-indigo-600">Saathi</span></span>
            </a>
            
            <div class="flex items-center gap-3">
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-all">
                    <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                </button>
                <button id="authTrigger" class="gradient-hero text-white px-5 py-2 rounded-xl text-sm font-bold shadow-lg">Admin</button>
            </div>
        </div>
    </nav>

    <header class="pt-40 pb-12 px-4 text-center">
        <h1 class="text-4xl md:text-6xl font-black mb-8">Verified <span class="text-indigo-600">HR Feed</span></h1>
        <div class="max-w-xl mx-auto relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
            <input type="text" id="searchInput" onkeyup="handleSearch()" placeholder="Search by topic, keyword, or law..." 
                class="w-full p-4 pl-12 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
        </div>
    </header>

    <main class="container mx-auto px-4 pb-32">
        <div class="flex flex-wrap justify-center gap-2 mb-12">
            <button class="cat-btn active px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="All">All</button>
            <button class="cat-btn px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="Recruitment">Recruitment</button>
            <button class="cat-btn px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="Leadership">Leadership</button>
            <button class="cat-btn px-6 py-2 rounded-full border border-slate-200 dark:border-slate-800 font-bold text-sm" data-category="Compliance">Compliance</button>
        </div>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="loginModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-md bg-black/50">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl w-full max-w-sm shadow-2xl text-center">
            <h2 class="text-xl font-bold mb-6">Admin Verification</h2>
            <input id="adminPin" type="password" maxlength="4" placeholder="PIN" class="w-full text-center text-3xl p-4 border rounded-2xl mb-6 bg-slate-50 dark:bg-slate-800 outline-none">
            <button onclick="checkPin()" class="w-full gradient-hero text-white p-4 rounded-2xl font-bold">Access Editor</button>
        </div>
    </div>

    <div id="publishModal" class="fixed inset-0 z-[101] hidden flex items-center justify-center p-4 backdrop-blur-md bg-black/50">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl w-full max-w-3xl shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-6">Create New Verified Insight</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input id="newTitle" type="text" placeholder="Title" class="p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none">
                <select id="newCategory" class="p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none">
                    <option>Recruitment</option><option>Leadership</option><option>Compliance</option><option>HR Trends</option>
                </select>
            </div>
            <input id="newMedia" type="text" placeholder="Image URL or YouTube Link" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-xl outline-none mb-4">
            <div id="editor-container" class="h-48 mb-12 dark:bg-slate-800"></div>
            <div class="flex gap-4">
                <button onclick="savePost()" class="flex-1 gradient-hero text-white p-4 rounded-xl font-bold">Publish to Global Feed</button>
                <button onclick="closeModal('publishModal')" class="px-6 bg-slate-100 dark:bg-slate-800 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="readerModal" class="fixed inset-0 z-[110] hidden flex items-center justify-center p-4 backdrop-blur-md bg-black/50">
        <div class="bg-white dark:bg-slate-900 p-8 md:p-12 rounded-[2rem] w-full max-w-4xl shadow-2xl max-h-[85vh] overflow-y-auto relative">
            <button onclick="closeModal('readerModal')" class="absolute top-6 right-6 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><i data-lucide="x"></i></button>
            <div id="readerBody"></div>
        </div>
    </div>

    <footer class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 py-12">
        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-6">
            <div class="text-center md:text-left">
                <span class="font-bold text-lg">HR Saathi</span>
                <p class="text-slate-500 text-sm mt-1">Empowering HR professionals through data.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="exportToCSV()" class="text-xs font-bold uppercase tracking-widest text-indigo-600">Export CSV</button>
                <div class="h-4 w-[1px] bg-slate-300"></div>
                <p class="text-xs text-slate-400 uppercase tracking-widest">© 2026 Verified Portal</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const MASTER_PIN = "1234";
        const quill = new Quill('#editor-container', { theme: 'snow' });
        
        let newsData = JSON.parse(localStorage.getItem('hr_saathi_pro')) || [
            { id: 1, title: "How to use HR Saathi", category: "Leadership", media: "https://images.unsplash.com/photo-1552664730-d307ca884978?w=800", excerpt: "Your guide to posting credible HR insights.", content: "<p>Welcome! Use the Admin button to start posting...</p>", date: "Jan 30, 2026" }
        ];

        // --- STEP 4.1: SEARCH LOGIC ---
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = newsData.filter(p => 
                p.title.toLowerCase().includes(query) || 
                p.excerpt.toLowerCase().includes(query) ||
                p.category.toLowerCase().includes(query)
            );
            renderGrid('All', filtered);
        }

        // --- STEP 4.2: DARK MODE ---
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('hr_dark_mode', document.documentElement.classList.contains('dark'));
        }
        if(localStorage.getItem('hr_dark_mode') === 'true') document.documentElement.classList.add('dark');

        function renderGrid(filter = 'All', customData = null) {
            const grid = document.getElementById('news-grid');
            grid.innerHTML = '';
            const dataToUse = customData || (filter === 'All' ? newsData : newsData.filter(item => item.category === filter));

            dataToUse.forEach(post => {
                const isVideo = post.media?.includes('youtube.com') || post.media?.includes('youtu.be');
                const el = document.createElement('article');
                el.className = "bg-white dark:bg-slate-900 rounded-3xl overflow-hidden shadow-sm hover:shadow-xl border border-slate-200 dark:border-slate-800 transition-all cursor-pointer group";
                el.onclick = () => openReader(post.id);
                el.innerHTML = `
                    <div class="h-48 bg-slate-100 dark:bg-slate-800 relative">
                        ${isVideo ? `<div class="absolute inset-0 flex items-center justify-center"><i data-lucide="video" class="w-10 h-10 text-indigo-500"></i></div>` : `<img src="${post.media}" class="w-full h-full object-cover">`}
                        <div class="absolute top-4 left-4 px-3 py-1 bg-white/90 dark:bg-slate-800/90 rounded-full text-[10px] font-black uppercase text-indigo-600">Verified</div>
                    </div>
                    <div class="p-6">
                        <span class="text-[10px] font-black uppercase text-slate-400">${post.category}</span>
                        <h3 class="text-lg font-bold mt-2 leading-tight group-hover:text-indigo-600 transition-colors">${post.title}</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm mt-3 line-clamp-2">${post.excerpt}</p>
                    </div>`;
                grid.appendChild(el);
            });
            lucide.createIcons();
        }

        // --- STEP 4.3: FIREBASE READY LOGIC ---
        // To make this "Live", you'd replace 'localStorage' with Firebase 'db.collection.add()'
        function savePost() {
            const title = document.getElementById('newTitle').value;
            if(!title) return alert("Title is required");

            const newPost = {
                id: Date.now(),
                title: title,
                category: document.getElementById('newCategory').value,
                media: document.getElementById('newMedia').value || "https://images.unsplash.com/photo-1497215728101-856f4ea42174?w=800",
                content: quill.root.innerHTML,
                excerpt: quill.getText().substring(0, 100) + "...",
                date: new Date().toLocaleDateString()
            };

            newsData.unshift(newPost);
            localStorage.setItem('hr_saathi_pro', JSON.stringify(newsData));
            renderGrid();
            closeModal('publishModal');
            alert("Published Successfully! (Data saved to local storage)");
        }

        // Auth & Modals
        document.getElementById('authTrigger').onclick = () => document.getElementById('loginModal').classList.remove('hidden');
        function checkPin() {
            if(document.getElementById('adminPin').value === MASTER_PIN) {
                closeModal('loginModal');
                document.getElementById('publishModal').classList.remove('hidden');
                document.getElementById('adminPin').value = '';
            } else { alert("Unauthorized"); }
        }

        function openReader(id) {
            const p = newsData.find(post => post.id === id);
            const isVideo = p.media?.includes('youtube.com') || p.media?.includes('youtu.be');
            let mediaHtml = `<img src="${p.media}" class="w-full h-80 object-cover rounded-3xl mb-8">`;
            
            if(isVideo) {
                const vidId = p.media.split('v=')[1] || p.media.split('/').pop();
                mediaHtml = `<iframe class="w-full aspect-video rounded-3xl mb-8" src="https://www.youtube.com/embed/${vidId}" frameborder="0" allowfullscreen></iframe>`;
            }

            document.getElementById('readerBody').innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <span class="text-indigo-600 font-black uppercase text-xs tracking-widest">${p.category}</span>
                    <h1 class="text-3xl md:text-5xl font-black mt-4 mb-8 leading-tight">${p.title}</h1>
                    ${mediaHtml}
                    <div class="prose dark:prose-invert prose-indigo max-w-none">${p.content}</div>
                    <div class="mt-12 pt-8 border-t border-slate-100 dark:border-slate-800">
                        <button onclick="deletePost(${p.id})" class="text-red-500 text-sm font-bold flex items-center gap-2 hover:opacity-70 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete Article</button>
                    </div>
                </div>`;
            document.getElementById('readerModal').classList.remove('hidden');
            lucide.createIcons();
        }

        function deletePost(id) {
            if(confirm("Permanently delete this report?")) {
                newsData = newsData.filter(p => p.id !== id);
                localStorage.setItem('hr_saathi_pro', JSON.stringify(newsData));
                renderGrid();
                closeModal('readerModal');
            }
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        
        function exportToCSV() {
            let csv = "Category,Title,Link\n";
            newsData.forEach(p => csv += `"${p.category}","${p.title}","${p.media}"\n`);
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'hr_saathi_backup.csv'; a.click();
        }

        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active', 'bg-indigo-600', 'text-white'));
                btn.classList.add('active', 'bg-indigo-600', 'text-white');
                renderGrid(btn.dataset.category);
            };
        });

        renderGrid();
    </script>
</body>
</html>
